# Dev profile defaults. Loaded by figment, then overridden by ZURFUR_*/DATABASE_URL/RUST_LOG env vars.
# Secrets (e.g. DATABASE_URL) are NOT set here — they live in the environment only.
env = "DEV"
http_addr = "127.0.0.1:8080"
# Externally-visible origin (scheme + host + port) used to build OAuth redirect URIs.
# In dev this is the loopback address; in prod it is the public HTTPS domain.
public_url = "http://127.0.0.1:8080"
log_level = "info,zurfur=debug"
