# Project name (and thus container/volume namespacing) defaults to `zurfur`.
# A git worktree overrides COMPOSE_PROJECT_NAME via its isolated .env
# (see scripts/worktree-init.sh) so parallel checkouts get their own stack.
name: ${COMPOSE_PROJECT_NAME:-zurfur}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zurfur
    ports:
      # Host port is env-driven so two worktrees can each run their own DB.
      # Defaults to 5432 for the primary checkout.
      - "${ZURFUR_DB_HOST_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  proxy:
    image: nginx:alpine
    ports:
      - "${ZURFUR_PROXY_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    profiles:
      - proxy

volumes:
  pg_data:
