name: CI

on:
  pull_request:
    # Base-branch filter: include feature/bug branches so STACKED PRs (a PR
    # targeting another PR's branch) run the same gate as PRs into main.
    branches: [main, "feature/**", "bug/**"]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # --locked: build exactly what Cargo.lock pins (a git dep's locked SHA,
      # not a re-resolve of its tag); a stale lockfile fails loudly here.
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  spec-lint:
    name: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Lint the hand-authored API contracts (OpenAPI / AsyncAPI) under openapi/.
      - run: npx --yes @redocly/cli@2.35.1 lint "openapi/*.yaml"

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Matches the lockfile-assertion convention the other jobs use.
          # --all-features: scan the full feature graph, not just default features.
          arguments: --locked --all-features
          # Full four-check set (advisories, licenses, bans, sources) —
          # all green: every workspace crate sets `publish = false`, and
          # MPL-2.0 (jacquard family) is Engineer-allowed in deny.toml.

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1
