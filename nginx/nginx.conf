events {
    worker_connections 1024;
}

http {
    upstream auth_frontend {
        server host.docker.internal:5173;
    }

    # Only upgrade Connection header when the client requests it
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # Auth frontend (default) with WebSocket/HMR support for Vite dev server
        location / {
            proxy_pass http://auth_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
